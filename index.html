<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.01の罠 — 螺旋する搾取 —</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; color: white; font-family: sans-serif; }
        #visibility-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10; background: transparent; }
        .col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; background: transparent; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .col:last-child { border-right: none; }
        .area-top { flex: 0 0 30vh; border-bottom: 2px solid #555; padding: 15px; box-sizing: border-box; background: transparent; overflow-y: auto; }
        .area-bottom { flex: 1; padding: 15px; box-sizing: border-box; overflow-y: auto; background: transparent; }
        h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #444; padding-bottom: 8px; display: flex; flex-direction: column; gap: 8px; text-shadow: 0 0 8px rgba(0,0,0,1); }
        button { cursor: pointer; border: none; font-weight: bold; outline: none; }
        .shop-tabs { display: flex; flex-wrap: wrap; gap: 3px; justify-content: flex-start; }
        .tab-btn { background: rgba(51, 51, 51, 0.8); color: #ccc; font-size: 0.6rem; padding: 4px 5px; border-radius: 2px; border: 1px solid #555; flex: 1 1 auto; }
        .tab-btn.active { background: #800080; color: white; border-color: #f0f; }
        #retire-trigger { width: 100%; height: 40px; background-color: rgba(102, 34, 34, 0.9); color: white; font-size: 1.2rem; border-radius: 5px; margin-bottom: 10px; }
        
        /* ログインエリアのスタイル */
        #auth-section { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .auth-btn-group { display: flex; gap: 4px; width: 100%; }
        .auth-btn { flex: 1; padding: 6px; font-size: 0.65rem; background: #333; color: #eee; border: 1px solid #555; border-radius: 3px; }
        #auth-status-name { font-size: 0.75rem; color: #0f0; margin-top: 2px; font-weight: bold; }

        .shop-item { background: rgba(26, 26, 26, 0.9); margin-bottom: 5px; padding: 8px; border: 1px solid #444; cursor: pointer; font-size: 0.75rem; color: #ddd; display: flex; justify-content: space-between; align-items: center; }
        .shop-item:hover { background: rgba(50, 50, 50, 0.9); color: white; }
        .item-count { color: #f0f; font-weight: bold; margin-left: 10px; }
        .main-btn-wrapper { display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 5%; }
        .main-btn { width: 48%; height: 60%; border-radius: 10px; border: 2px solid #555; position: relative; z-index: 20; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        #through-btn { background-color: #fff; color: black; font-size: 1.5rem; }
        #reward-btn { color: transparent; border: none; background-color: #fff; } 
        .status-text { font-size: 0.95rem; line-height: 1.6; color: #eee; }
        #log-list { list-style: none; padding: 0; margin: 0; font-size: 0.75rem; }
        .log-entry { border-bottom: 1px dashed #333; padding: 10px 0; color: #bbb; line-height: 1.4; }
        .log-entry span { color: #f0f; font-weight: bold; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(17, 17, 17, 0.95); border: 2px solid #f0f; padding: 25px; z-index: 1000; width: 320px; box-shadow: 0 0 30px rgba(128,0,128,0.5); }
    </style>
</head>
<body>

    <canvas id="visibility-canvas"></canvas>

    <div id="retire-modal" class="modal">
        <h3 style="color:#f0f; border:none; text-align:center;">リタイア確認</h3>
        <button id="confirm-retire" style="width:100%; padding:10px; background:#900; color:white; margin-bottom:5px;">確定して終了</button>
        <button id="cancel-retire" style="width:100%; padding:10px; background:#444; color:white;">戻る</button>
    </div>

    <div class="container">
        <div class="col">
            <div class="area-top">
                <button id="retire-trigger">リタイア</button>
                <div id="auth-section">
                    <div class="auth-btn-group">
                        <button class="auth-btn" id="login-btn">ログイン</button>
                        <button class="auth-btn" id="logout-btn">ログアウト</button>
                        <button class="auth-btn" id="change-btn">アカウント変更</button>
                    </div>
                    <div id="auth-status-name">未ログイン</div>
                </div>
            </div>
            <div class="area-bottom">
                <h3>
                    <span>SHOP (悪意の均衡)</span>
                    <div class="shop-tabs">
                        <button class="tab-btn active" onclick="switchTab(0)">転生</button>
                        <button class="tab-btn" onclick="switchTab(1)">即増</button>
                        <button class="tab-btn" onclick="switchTab(2)">即減</button>
                        <button class="tab-btn" onclick="switchTab(3)">増量UP</button>
                        <button class="tab-btn" onclick="switchTab(4)">抑制</button>
                    </div>
                </h3>
                <div id="shop-container"></div>
            </div>
        </div>
        <div class="col">
            <div class="area-top">
                <h3>相談窓口（現実）</h3>
                <p style="font-size: 0.8rem; color:#bbb;">警察庁 匿名通報: 0120-924-839</p>
            </div>
            <div class="area-bottom">
                <div class="main-btn-wrapper">
                    <button id="through-btn" class="main-btn">回避</button>
                    <button id="reward-btn" class="main-btn"></button>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="area-top status-text">
                <p>報酬: <span id="money-disp">0</span></p>
                <p>累計: <span id="total-money-disp">0</span></p>
                <p>階層: <span id="rank-disp">0</span></p>
                <p>回避(成/失): <span id="thru-succ-disp">0</span> / <span id="thru-fail-disp">0</span></p>
            </div>
            <div class="area-bottom">
                <h3>履歴</h3>
                <ul id="log-list"></ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAaTVoLldKTs_eqJzn-J9QpQL9-UaZK5XM", authDomain: "nowanarasensurusakushu.firebaseapp.com", projectId: "nowanarasensurusakushu", storageBucket: "nowanarasensurusakushu.firebasestorage.app", messagingSenderId: "164645357186", appId: "1:164645357186:web:40023f7d16dd28cf4f169b" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let game = JSON.parse(localStorage.getItem('vicious_spiral_save')) || {
            money: 0, totalMoney: 0, currentReward: 1.0, rank: 0, risk: 0, 
            rewardIncRate: 0.01, riskIncRate: 0.05, thruSucc: 0, thruFail: 0, currentTab: 0,
            shopCounts: { 0: [0], 1: Array(10).fill(0), 2: Array(10).fill(0), 3: Array(10).fill(0), 4: Array(10).fill(0) }
        };

        const updateUI = () => {
            document.getElementById('money-disp').innerText = Math.floor(game.money).toLocaleString();
            document.getElementById('total-money-disp').innerText = Math.floor(game.totalMoney).toLocaleString();
            document.getElementById('rank-disp').innerText = game.rank;
            document.getElementById('thru-succ-disp').innerText = game.thruSucc;
            document.getElementById('thru-fail-disp').innerText = game.thruFail;
            
            const v = Math.min(255, Math.floor((game.risk / 100) * 255));
            document.getElementById('through-btn').style.backgroundColor = `rgb(${v},${v},${v})`;
            document.getElementById('through-btn').style.color = v > 128 ? 'black' : 'white';
            renderShop();
        };

        const saveGame = async () => {
            localStorage.setItem('vicious_spiral_save', JSON.stringify(game));
            localStorage.setItem('vicious_spiral_logs', document.getElementById('log-list').innerHTML);
            if (auth.currentUser) await setDoc(doc(db, "users", auth.currentUser.uid), { game });
        };

        onAuthStateChanged(auth, async (user) => {
            const label = document.getElementById('auth-status-name');
            if (user) {
                label.innerText = user.displayName;
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) { game = snap.data().game; updateUI(); }
            } else { label.innerText = "未ログイン"; }
        });

        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('change-btn').onclick = () => signInWithPopup(auth, provider);

        window.switchTab = (idx) => { game.currentTab = idx; document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx)); renderShop(); };

        function renderShop() {
            const container = document.getElementById('shop-container');
            container.innerHTML = "";
            const r = game.rank + 1;
            const createItem = (tab, idx, label, cost, action) => {
                const count = game.shopCounts[tab][idx];
                const cCost = Math.floor(cost * Math.pow(1.15, count));
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `<span>${label} (${cCost.toLocaleString()})</span><span class="item-count">[${count}]</span>`;
                div.onclick = () => { if(game.money >= cCost){ game.money -= cCost; game.shopCounts[tab][idx]++; action(); saveGame(); updateUI(); } };
                container.appendChild(div);
            };

            if(game.currentTab === 0) createItem(0, 0, "転生", 200000 * Math.pow(2, game.rank), () => { game.rank++; game.risk = 0; });
            if(game.currentTab === 1) for(let i=0; i<5; i++) createItem(1, i, `即時報酬+${(i+1)*5}`, (i+1)*500*r, () => game.currentReward += (i+1)*5);
            if(game.currentTab === 2) for(let i=0; i<5; i++) createItem(2, i, `即時リスク-${(i+1)}%`, (i+1)*1000*r, () => game.risk = Math.max(0, game.risk - (i+1)));
            if(game.currentTab === 3) for(let i=0; i<5; i++) createItem(3, i, `増量効率UP +${(i+1)*0.01}`, (i+1)*2000*r, () => game.rewardIncRate += (i+1)*0.01);
            if(game.currentTab === 4) for(let i=0; i<5; i++) createItem(4, i, `リスク上昇抑制 -${(i+1)*0.005}`, (i+1)*3000*r, () => game.riskIncRate = Math.max(0.001, game.riskIncRate - (i+1)*0.005));
        }

        document.getElementById('reward-btn').onclick = () => { game.money += game.currentReward; game.totalMoney += game.currentReward; game.risk = Math.min(100, game.risk + game.riskIncRate); updateUI(); };
        document.getElementById('through-btn').onclick = () => { game.thruSucc++; updateUI(); };
        document.getElementById('retire-trigger').onclick = () => document.getElementById('retire-modal').style.display = 'block';
        document.getElementById('confirm-retire').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('cancel-retire').onclick = () => document.getElementById('retire-modal').style.display = 'none';

        updateUI();
        const savedLogs = localStorage.getItem('vicious_spiral_logs');
        if (savedLogs) document.getElementById('log-list').innerHTML = savedLogs;
    </script>
</body>
</html>
