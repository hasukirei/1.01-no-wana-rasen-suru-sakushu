<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1.01の罠 — 螺旋する搾取 —</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        html, body { touch-action: manipulation; margin: 0; padding: 0; background: black; color: white; font-family: sans-serif; overflow: hidden; height: 100%; }
        #visibility-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10; }
        .col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .area-top { flex: 0 0 30vh; border-bottom: 2px solid #555; padding: 10px; overflow-y: auto; }
        .area-mid { flex: 0 0 20vh; border-bottom: 2px solid #555; padding: 10px; background: rgba(20, 0, 20, 0.7); }
        .area-bottom { flex: 1; padding: 10px; overflow-y: auto; }
        
        /* ボタン類 */
        #retire-trigger { width: 100%; height: 80%; background: #622; color: white; font-size: 1.8rem; border-radius: 5px; cursor: pointer; }
        .main-btn-wrapper { display: flex; justify-content: space-around; align-items: center; height: 100%; }
        .main-btn { width: 45%; height: 70%; border-radius: 15px; border: 2px solid #444; font-size: 1.5rem; cursor: pointer; }
        #through-btn { background: white; color: black; }
        #reward-btn { transition: background-color 0.1s; } /* 動的に色が変わる */

        /* SHOP & LOG */
        .shop-tabs { display: flex; gap: 2px; margin-bottom: 5px; }
        .tab-btn { flex: 1; font-size: 0.6rem; padding: 3px; background: #333; color: #ccc; border: 1px solid #555; }
        .tab-btn.active { background: #808; color: white; }
        .shop-item { background: #1a1a1a; margin-bottom: 4px; padding: 6px; border: 1px solid #333; font-size: 0.7rem; display: flex; justify-content: space-between; }
        .log-entry { border-bottom: 1px dashed #444; padding: 5px 0; font-size: 0.7rem; color: #bbb; }

        /* モーダル */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #f0f; padding: 20px; z-index: 1000; width: 280px; }
        .reason-item { display: block; margin: 10px 0; font-size: 1rem; }
    </style>
</head>
<body>
    <canvas id="visibility-canvas"></canvas>

    <div id="retire-modal" class="modal">
        <h3 style="color:#f0f; text-align:center;">リタイア理由を選択</h3>
        <label class="reason-item"><input type="checkbox" name="reason" value="身の危険"> 身の危険</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="良心"> 良心の呵責</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="満足"> 充分に稼いだ</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="限界"> 精神的限界</label>
        <button id="confirm-retire" style="width:100%; padding:10px; background:red; color:white; font-weight:bold;">確定</button>
    </div>

    <div class="container">
        <div class="col">
            <div class="area-top"><button id="retire-trigger">リタイア</button></div>
            <div class="area-bottom">
                <div class="shop-tabs" id="tabs"></div>
                <div id="shop-container"></div>
            </div>
        </div>
        <div class="col">
            <div class="area-top">
                <h4 style="margin:0; color:#f0f;">犯罪相談窓口</h4>
                <p style="font-size:0.7rem; color:#aaa;">警察庁: 0120-924-839<br>貸金業: 0570-051-051<br>法テラス: 0570-078374</p>
                <div id="login-area">
                    <div id="g_id_onload" data-client_id="245586344293-jj8m9cj9k7qel20sapbp6g34gf97nfpf.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-type="standard" data-size="small"></div>
                </div>
                <div id="user-profile" style="display:none; color:#0f0; font-size:0.7rem;">Login: <span id="user-name"></span></div>
            </div>
            <div class="area-bottom">
                <div class="main-btn-wrapper">
                    <button id="through-btn" class="main-btn">スルー</button>
                    <button id="reward-btn" class="main-btn"></button>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="area-top" style="font-size:0.8rem;">
                報酬: <span id="money-disp">0</span><br>
                累計: <span id="total-disp">0</span><br>
                階層: <span id="rank-disp">0</span><br>
                危険: <span id="risk-disp">0</span>%<br>
                状態: <span id="status-label" style="color:#f0f;">通常</span>
            </div>
            <div class="area-bottom">
                <h4 style="margin:0; border-bottom:1px solid #444;">履歴ログ</h4>
                <ul id="log-list" style="list-style:none; padding:0;"></ul>
            </div>
        </div>
    </div>

    <script>
        let game = {
            money: 0, totalMoney: 0, rank: 0, risk: 0,
            baseD: 0.01, currentReward: 1.0,
            thruSucc: 0, thruFail: 0,
            isNextDanger: false, // 二段階判定の1回目失敗による「強制危険」状態
            isNoRewardPeriod: false,
            bonusCount: 0, bonusRemaining: 0, bonusProb: 0, // 接待モード
            currentTab: 0, shopCounts: {0:[0], 1:Array(5).fill(0), 2:Array(5).fill(0), 3:Array(5).fill(0), 4:Array(5).fill(0)}
        };

        const dom = {
            money: document.getElementById('money-disp'), total: document.getElementById('total-disp'),
            rank: document.getElementById('rank-disp'), risk: document.getElementById('risk-disp'),
            status: document.getElementById('status-label'), rewardBtn: document.getElementById('reward-btn'),
            log: document.getElementById('log-list'), shop: document.getElementById('shop-container')
        };

        function handleCredentialResponse(r) {
            const p = JSON.parse(atob(r.credential.split('.')[1]));
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('user-profile').style.display = 'block';
            document.getElementById('user-name').innerText = p.name;
        }

        function updateUI() {
            dom.money.innerText = Math.floor(game.money).toLocaleString();
            dom.total.innerText = Math.floor(game.totalMoney).toLocaleString();
            dom.rank.innerText = game.rank;
            dom.risk.innerText = game.risk.toFixed(2);
            
            // 色偏移ロジック (3.2節)
            // n%の時 報酬ボタン白色度(100-n)% / 危険ボタン黒色度(100-n)%
            let n = game.risk;
            if (game.isNextDanger) {
                let gray = Math.floor(255 * (1 - (100 - n) / 100)); // 危険ボタン: 100%で白(255), 0%で黒(0)
                dom.rewardBtn.style.backgroundColor = `rgb(${gray},${gray},${gray})`;
            } else {
                let white = Math.floor(255 * (100 - n) / 100); // 報酬ボタン: 0%で白(255), 100%で黒(0)
                dom.rewardBtn.style.backgroundColor = `rgb(${white},${white},${white})`;
            }

            dom.status.innerText = game.bonusRemaining > 0 ? "接待モード" : (game.isNoRewardPeriod ? "報酬不可" : "通常");
            dom.status.style.color = game.bonusRemaining > 0 ? "#0f0" : (game.isNoRewardPeriod ? "#f00" : "#f0f");
            renderShop();
        }

        // メインロジック: 二段階判定
        dom.rewardBtn.onclick = () => {
            // 危険ボタン（黒）を踏んだ場合
            if (game.isNextDanger) {
                recordLog("危険接触", ["不注意"]);
                return;
            }

            // 接待モード中は安全
            if (game.bonusRemaining > 0) {
                game.money += game.currentReward * 20;
                game.totalMoney += game.currentReward * 20;
                game.bonusRemaining--;
                if (game.bonusRemaining === 0) game.isNoRewardPeriod = true;
                updateUI(); return;
            }

            // 通常時: 二段階判定
            let riskRoll = game.risk;
            // 一回目判定
            if (Math.random() * 100 < riskRoll) {
                game.isNextDanger = true; // 次が強制的に危険ボタンになる
            } else {
                // 二回目判定（再抽選）
                if (Math.random() * 100 < riskRoll) {
                    // 命中（失敗）: 報酬0 & 接待モード発動条件(4.1-2)
                    game.isNoRewardPeriod = true;
                    startBonus(); // 二回目失敗はボーナス発動
                } else {
                    // 回避成功
                    processSuccess();
                    // 接待モード抽選 (4.1-1)
                    game.bonusCount++;
                    if (game.bonusCount % 3 === 0) game.bonusProb += 0.02;
                    if (Math.random() * 100 < game.bonusProb) startBonus();
                }
            }

            // リスク加速ロジック (4.2 & 5.1)
            let d = 0.01 * (1 + game.rank);
            if (game.isNoRewardPeriod) {
                game.risk += 0.1 * (1 + game.risk); // 10倍加速
            } else {
                game.currentReward += d;
                game.risk += 0.05; 
            }
            updateUI();
        };

        function processSuccess() {
            if (game.isNoRewardPeriod) {
                game.isNoRewardPeriod = false; // 復帰条件
            }
            game.money += game.currentReward;
            game.totalMoney += game.currentReward;
        }

        function startBonus() {
            game.bonusRemaining = 10;
            game.isNextDanger = false;
        }

        document.getElementById('through-btn').onclick = () => {
            if (game.isNextDanger) { game.isNextDanger = false; game.thruSucc++; }
            else { game.currentReward = 1; game.thruFail++; }
            updateUI();
        };

        function recordLog(type, reasons) {
            const li = document.createElement('li'); li.className = 'log-entry';
            li.innerHTML = `階層:${game.rank} | 累計:${Math.floor(game.totalMoney).toLocaleString()} | ${type} (${reasons.join('/')})`;
            dom.log.prepend(li);
            if (dom.log.children.length > 100) dom.log.lastChild.remove();
            resetGame();
        }

        function resetGame() {
            game.money = 0; game.totalMoney = 0; game.rank = 0; game.risk = 0;
            game.currentReward = 1; game.isNextDanger = false; game.isNoRewardPeriod = false;
            game.bonusRemaining = 0; game.bonusProb = 0;
            updateUI();
        }

        // リタイア処理
        document.getElementById('retire-trigger').onclick = () => document.getElementById('retire-modal').style.display = 'block';
        document.getElementById('confirm-retire').onclick = () => {
            const reasons = Array.from(document.querySelectorAll('input[name="reason"]:checked')).map(c => c.value);
            recordLog("リタイア", reasons);
            document.getElementById('retire-modal').style.display = 'none';
        };

        // SHOP & 転生
        function renderShop() {
            const container = dom.shop; container.innerHTML = "";
            const tabs = ["転生", "攻撃", "防御", "抑制"];
            document.getElementById('tabs').innerHTML = tabs.map((t, i) => `<button class="tab-btn ${game.currentTab===i?'active':''}" onclick="game.currentTab=${i};updateUI();">${t}</button>`).join('');

            if (game.currentTab === 0) {
                let cost = 505450 * Math.pow(1.01, game.rank);
                container.innerHTML = `<div class="shop-item" onclick="rebirth(${cost})"><span>次なる階層へ</span><span>${Math.floor(cost).toLocaleString()}</span></div>`;
            } else {
                // 簡易化したアイテムスロット
                for(let i=0; i<3; i++) {
                    let cost = Math.floor(1000 * Math.pow(1.1, game.shopCounts[game.currentTab][i]));
                    container.innerHTML += `<div class="shop-item" onclick="buyItem(${game.currentTab},${i},${cost})"><span>Item Lv${i+1}</span><span>${cost}</span></div>`;
                }
            }
        }

        function rebirth(cost) {
            if (game.money >= cost) { game.rank++; resetGame(); }
        }

        function buyItem(t, i, c) {
            if (game.money >= c) {
                game.money -= c; game.shopCounts[t][i]++;
                if (t === 1) { game.currentReward *= 1.2; game.risk += 1; }
                if (t === 2) { game.risk = Math.max(0, game.risk - 0.5); game.currentReward *= 0.9; }
                updateUI();
            }
        }

        // 背景描画
        const canvas = document.getElementById('visibility-canvas'), ctx = canvas.getContext('2d');
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let t = Date.now() / 1000;
            let x = canvas.width/2 + Math.sin(t) * 50, y = canvas.height/2 + Math.cos(t) * 50;
            let g = ctx.createRadialGradient(x, y, 0, x, y, 400);
            g.addColorStop(0, 'rgba(50, 0, 50, 0.8)');
            g.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width, canvas.height);
            requestAnimationFrame(draw);
        }
        draw(); updateUI();
    </script>
</body>
</html>
