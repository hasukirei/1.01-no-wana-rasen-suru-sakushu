<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.01の罠 — 螺旋する搾取 —</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; color: white; font-family: sans-serif; }
        
        #visibility-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 5; pointer-events: none; 
        }
        
        .container { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10; background: transparent; }
        .col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; background: transparent; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .col:last-child { border-right: none; }
        .area-top { flex: 0 0 30vh; border-bottom: 2px solid #555; padding: 15px; box-sizing: border-box; background: transparent; overflow-y: auto; }
        .area-bottom { flex: 1; padding: 15px; box-sizing: border-box; overflow-y: auto; background: transparent; }
        
        h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #444; padding-bottom: 8px; display: flex; flex-direction: column; gap: 8px; }
        button { cursor: pointer; border: none; font-weight: bold; outline: none; position: relative; z-index: 20; }
        
        .shop-tabs { display: flex; flex-wrap: wrap; gap: 3px; }
        .tab-btn { background: rgba(51, 51, 51, 0.8); color: #ccc; font-size: 0.6rem; padding: 4px 5px; border: 1px solid #555; }
        .tab-btn.active { background: #800080; color: white; border-color: #f0f; }
        
        #retire-trigger { width: 100%; height: 60%; background-color: rgba(102, 34, 34, 0.9); color: white; font-size: 1.8rem; border-radius: 5px; }
        
        .shop-item { background: rgba(26, 26, 26, 0.9); margin-bottom: 5px; padding: 8px; border: 1px solid #444; cursor: pointer; font-size: 0.75rem; display: flex; justify-content: space-between; }
        
        .main-btn-wrapper { display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 5%; }
        .main-btn { width: 48%; height: 60%; border-radius: 10px; border: 2px solid #555; font-size: 1.5rem; transition: background-color 0.1s, color 0.1s; }
        
        /* 回避ボタン: 初期は黒、リスクに応じて白へ */
        #through-btn { background-color: rgb(0, 0, 0); color: white; }
        /* 報酬ボタン: 白色固定 */
        #reward-btn { background-color: white; color: black; } 
        
        .status-text { font-size: 0.8rem; line-height: 1.4; }
        #google-auth-area { margin-top: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .mini-btn { background: #333; color: #eee; font-size: 0.6rem; padding: 5px 8px; border: 1px solid #555; }

        #retire-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content { background: #1a1a1a; padding: 20px; border: 1px solid #555; border-radius: 8px; width: 280px; }
        .reason-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <canvas id="visibility-canvas"></canvas>

    <div id="retire-modal">
        <div class="modal-content">
            <h4>リタイアの理由</h4>
            <div class="reason-item"><input type="checkbox" class="retire-reason" id="r1"><label for="r1">身の危険を感じた</label></div>
            <div class="reason-item"><input type="checkbox" class="retire-reason" id="r2"><label for="r2">良心の呵責</label></div>
            <div class="reason-item"><input type="checkbox" class="retire-reason" id="r3"><label for="r3">充分に稼いだ</label></div>
            <div class="reason-item"><input type="checkbox" class="retire-reason" id="r4"><label for="r4">精神的限界</label></div>
            <div class="modal-btns">
                <button style="background:#444; color:white; padding:5px 10px;" id="retire-cancel">戻る</button>
                <button style="background:#600; color:white; padding:5px 10px;" id="retire-confirm">実行</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="col">
            <div class="area-top">
                <button id="retire-trigger">リタイア</button>
                <div id="google-auth-area">
                    <div id="auth-status-label">未ログイン</div>
                    <button class="mini-btn" id="login-btn">ログイン</button>
                </div>
            </div>
            <div class="area-bottom">
                <h3>SHOP<div class="shop-tabs" id="tab-parent"></div></h3>
                <div id="shop-container"></div>
            </div>
        </div>
        <div class="col">
            <div class="area-top"><h3>相談窓口</h3><p style="font-size:0.7rem;">警察庁匿名通報: 0120-924-839</p></div>
            <div class="area-bottom"><div class="main-btn-wrapper">
                <button id="through-btn" class="main-btn">回避</button>
                <button id="reward-btn" class="main-btn"></button>
            </div></div>
        </div>
        <div class="col">
            <div class="area-top status-text">
                <p>報酬: <span id="money-disp">0</span></p>
                <p>リスク: <span id="risk-disp">0</span>%</p>
                <p>回避成功: <span id="thru-succ-disp">0</span></p>
            </div>
            <div class="area-bottom"><ul id="log-list"></ul></div>
        </div>
    </div>

    <script type="module">
        // Firebase設定などは省略（構造維持）
        let game = { money: 0, risk: 0, thruSucc: 0, rank: 0 };

        const updateUI = () => {
            document.getElementById('money-disp').innerText = Math.floor(game.money).toLocaleString();
            document.getElementById('risk-disp').innerText = game.risk.toFixed(2);
            document.getElementById('thru-succ-disp').innerText = game.thruSucc;

            // 回避ボタンの背景色制御: 0%なら黒(0,0,0)、100%なら白(255,255,255)
            const val = Math.min(255, Math.floor((game.risk / 100) * 255));
            const btn = document.getElementById('through-btn');
            btn.style.backgroundColor = `rgb(${val}, ${val}, ${val})`;
            btn.style.color = val > 128 ? 'black' : 'white'; // 文字色も反転させて同化させる
        };

        document.getElementById('reward-btn').onclick = () => {
            game.money += 100; // 仮
            game.risk = Math.min(100, game.risk + 0.5); // 報酬を得るほどリスク上昇
            updateUI();
        };

        document.getElementById('through-btn').onclick = () => {
            game.thruSucc++;
            updateUI();
        };

        document.getElementById('retire-trigger').onclick = () => { document.getElementById('retire-modal').style.display = 'flex'; };
        document.getElementById('retire-cancel').onclick = () => { document.getElementById('retire-modal').style.display = 'none'; };
        document.getElementById('retire-confirm').onclick = () => { location.reload(); };

        // 鼓動演出
        const canvas = document.getElementById('visibility-canvas'), ctx = canvas.getContext('2d');
        let beatRadius = 100, growing = true, speed = 0.05, targetMax = 300, targetMin = 50;
        function animate() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if (growing) {
                beatRadius += speed * 50;
                if (beatRadius >= targetMax) { growing = false; targetMin = 30 + Math.random() * 70; speed = 0.02 + Math.random() * 0.08; }
            } else {
                beatRadius -= speed * 50;
                if (beatRadius <= targetMin) { growing = true; targetMax = 200 + Math.random() * 200; speed = 0.02 + Math.random() * 0.08; }
            }
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, beatRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(80, 0, 120, 0.2)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(150, 0, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
            requestAnimationFrame(animate);
        }
        animate();
        updateUI();
    </script>
</body>
</html>
