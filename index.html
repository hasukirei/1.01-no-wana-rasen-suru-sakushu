<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>1.01の罠 — 螺旋する搾取 —</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; color: white; font-family: sans-serif; }
        #visibility-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10; }
        .col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; background: transparent; }
        .area-top { flex: 0 0 30vh; border-bottom: 2px solid #555; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .area-bottom { flex: 1; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.1s; border-radius: 5px; }
        .main-btn { width: 48%; height: 60%; font-size: 1.2rem; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #reward-btn { background: #fff; color: #000; }
        #through-btn { background: #444; color: #fff; }
        
        #auth-area { font-size: 0.7rem; text-align: center; margin-top: 10px; border: 1px solid #444; padding: 8px; background: rgba(20,20,20,0.8); }
        .user-name { color: #0f0; font-weight: bold; }
        #sync-msg { color: #f0f; font-size: 0.6rem; height: 12px; margin-top: 4px; }
        
        #log-list { list-style: none; padding: 0; font-size: 0.7rem; color: #bbb; }
        .log-entry { border-bottom: 1px solid #222; padding: 5px 0; line-height: 1.4; }
        .danger-text { color: #f44; font-weight: bold; }
        .bonus-text { color: #ff0; text-shadow: 0 0 5px #f00; }

        .status-val { font-family: monospace; color: #0f0; font-size: 1.1rem; }
    </style>
</head>
<body>
    <canvas id="visibility-canvas"></canvas>

    <div class="container">
        <div class="col">
            <div class="area-top">
                <button id="retire-btn" style="width:100%; height:50px; background:#600; color:white; font-size:1.1rem;">リタイア（理由選択）</button>
                <div id="auth-area">
                    <button id="login-btn" style="background:#4285f4; color:white; padding:8px 12px; margin-bottom:5px;">Googleでログイン</button>
                    <div id="auth-status">未ログイン</div>
                    <div id="sync-msg"></div>
                </div>
            </div>
            <div class="area-bottom">
                <h3 id="rank-title">SHOP (階層: 0)</h3>
                <div id="shop-container"></div>
            </div>
        </div>

        <div class="col">
            <div class="area-top">
                <h4 style="color:#f0f; margin:0; border-bottom:1px solid #f0f;">【犯罪相談窓口】</h4>
                <p style="font-size:0.75rem; color:#ccc; line-height:1.6;">
                    警察庁 匿名通報: 0120-924-839<br>
                    法テラス: 0570-078374<br>
                    貸金業相談: 0570-051-051
                </p>
            </div>
            <div class="area-bottom" style="display:flex; justify-content:space-around; align-items:center;">
                <button id="through-btn" class="main-btn">スルー</button>
                <button id="reward-btn" class="main-btn">報酬獲得</button>
            </div>
        </div>

        <div class="col">
            <div class="area-top">
                <p>報酬: <span id="money-disp" class="status-val">0</span></p>
                <p>累計: <span id="total-disp" class="status-val">0</span></p>
                <p>危険度: <span id="risk-disp" class="status-val">0.00</span>%</p>
                <p id="bonus-status" style="font-weight:bold;"></p>
            </div>
            <div class="area-bottom">
                <h4>履歴ログ (直近100件)</h4>
                <ul id="log-list"></ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // あなたのプロジェクト構成情報
        const firebaseConfig = {
            apiKey: "AIzaSyAaTVoLldKTs_eqJzn-J9QpQL9-UaZK5XM",
            authDomain: "nowanarasensurusakushu.firebaseapp.com",
            projectId: "nowanarasensurusakushu",
            storageBucket: "nowanarasensurusakushu.firebasestorage.app",
            messagingSenderId: "164645357186",
            appId: "1:164645357186:web:40023f7d16dd28cf4f169b",
            measurementId: "G-WMTFPE6KEH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 5. 経済成長とリセット (初期値)
        let game = {
            money: 0, totalMoney: 0, rank: 0, risk: 0,
            currentReward: 1.0, 
            isNextDeath: false, // 仕様3.1 強制リタイアフラグ
            isNoRewardPeriod: false, // 仕様4.2 報酬不可期間
            bonusCount: 0, // 仕様4.1 ボーナス残数
            setCount: 0, 
            bonusProb: 0, 
            thruSucc: 0, thruFail: 0
        };

        let userUid = null;

        const dom = {
            money: document.getElementById('money-disp'),
            total: document.getElementById('total-disp'),
            risk: document.getElementById('risk-disp'),
            rewardBtn: document.getElementById('reward-btn'),
            logList: document.getElementById('log-list'),
            sync: document.getElementById('sync-msg'),
            bonus: document.getElementById('bonus-status')
        };

        function addLog(msg, isDanger=false, isBonus=false) {
            const li = document.createElement('li');
            li.className = `log-entry ${isDanger ? 'danger-text' : ''} ${isBonus ? 'bonus-text' : ''}`;
            li.innerText = `[階層${game.rank}] ${msg}`;
            dom.logList.prepend(li);
            if(dom.logList.children.length > 100) dom.logList.lastChild.remove();
        }

        async function syncData() {
            if(!userUid) return;
            dom.sync.innerText = "同期中...";
            try {
                await setDoc(doc(db, "users", userUid), { game, updatedAt: Date.now() });
                dom.sync.innerText = "クラウド同期完了";
            } catch (e) {
                dom.sync.innerText = "同期失敗（Firestoreの設定を確認）";
            }
        }

        // 3.1 報酬ボタンの二段階抽選ロジック
        dom.rewardBtn.onclick = () => {
            if(game.isNextDeath) {
                processRetire("【破綻】不可視のリスクに接触しました。");
                return;
            }

            // 4.1 報酬爆増ボーナス（接待モード）
            if(game.bonusCount > 0) {
                applyGain(20); 
                game.bonusCount--;
                if(game.bonusCount === 0) {
                    game.isNoRewardPeriod = true; 
                    addLog("接待モード終了。これより搾取（報酬不可期間）が始まります。", true);
                }
                updateUI();
                return;
            }

            // 一回目判定
            if(Math.random() * 100 < game.risk) {
                game.isNextDeath = true;
                addLog("警告：ボタンが変色。リスクが閾値を超えました。", true);
                updateUI();
                return;
            }

            // 二回目判定（再抽選）
            if(Math.random() * 100 < game.bonusProb || Math.random() * 100 < game.risk) {
                // 仕様4.1: 再抽選失敗または確率当選でボーナス発動
                startBonus();
                return;
            }

            // 回避成功
            applyGain(1);
            game.setCount++;
            if(game.setCount >= 3) {
                game.bonusProb += 0.02; // セットごとに確率蓄積
                game.setCount = 0;
            }
            updateUI();
            syncData();
        };

        function applyGain(mult) {
            let d = 0.01 * (1 + game.rank); // 仕様5.1 公差
            let gain = game.isNoRewardPeriod ? 0 : game.currentReward * mult;
            
            game.money += gain;
            game.totalMoney += gain;
            
            if(!game.isNoRewardPeriod) {
                game.currentReward += d;
                game.risk += 0.05 + (game.rank * 0.02);
            } else {
                // 4.2 リスク加速 (10倍)
                game.risk += (0.1 * (1 + game.risk));
            }
            game.risk = Math.min(99.9, game.risk);
        }

        function startBonus() {
            game.bonusCount = 10;
            addLog("★報酬爆増ボーナス発動★ (10回連続20倍)", false, true);
            updateUI();
        }

        function processRetire(reason) {
            alert(reason);
            addLog(reason, true);
            // 初期化
            game.money = 0; game.risk = 0; game.isNextDeath = false;
            game.isNoRewardPeriod = false; game.bonusCount = 0;
            syncData();
            updateUI();
        }

        document.getElementById('through-btn').onclick = () => {
            if(game.isNextDeath) {
                game.isNextDeath = false;
                game.isNoRewardPeriod = false; // 復帰条件クリア
                addLog("スルー成功：リスクを回避しました。");
            } else {
                game.currentReward = 1; // 仕様：報酬額リセット
                addLog("スルー：安全を優先し報酬額が初期化されました。");
            }
            updateUI();
            syncData();
        };

        function updateUI() {
            dom.money.innerText = Math.floor(game.money).toLocaleString();
            dom.total.innerText = Math.floor(game.totalMoney).toLocaleString();
            dom.risk.innerText = game.risk.toFixed(2);
            dom.bonus.innerText = game.bonusCount > 0 ? `接待モード：残り${game.bonusCount}回` : (game.isNoRewardPeriod ? "【報酬不可期間：リスク加速中】" : "");
            dom.bonus.style.color = game.bonusCount > 0 ? "#ff0" : "#f44";
            
            // 3.2 視認性の相関
            let n = game.risk;
            let btnColor = 255 * (1 - n/100);
            if(game.isNextDeath) {
                dom.rewardBtn.style.backgroundColor = `rgb(${255 * (n/100)}, 0, 0)`;
                dom.rewardBtn.innerText = "！？";
            } else {
                dom.rewardBtn.style.backgroundColor = `rgb(${btnColor}, ${btnColor}, ${btnColor})`;
                dom.rewardBtn.innerText = "報酬獲得";
            }
        }

        // Auth & 同期
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                userUid = user.uid;
                document.getElementById('auth-status').innerHTML = `Login: <span class="user-name">${user.displayName}</span>`;
                const snap = await getDoc(doc(db, "users", userUid));
                if(snap.exists()) {
                    game = snap.data().game;
                    addLog("クラウドからデータを復元しました。");
                    updateUI();
                }
            }
        });
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

        // 背景アニメ (動的視認性制御)
        const canvas = document.getElementById('visibility-canvas'), ctx = canvas.getContext('2d');
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let time = Date.now() * 0.001;
            let radius = 300 + Math.sin(time) * 100;
            let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, radius);
            grad.addColorStop(0, 'rgba(80, 0, 120, 0.6)');
            grad.addColorStop(1, 'black');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
