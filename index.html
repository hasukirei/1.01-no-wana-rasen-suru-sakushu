<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1.01の罠 — 螺旋する搾取 —</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        html, body, button, .shop-item, .main-btn, label, input { touch-action: manipulation; }
        body, html { margin: 0; padding: 0; min-height: 100%; background-color: black; color: white; font-family: sans-serif; overflow-x: hidden; }
        #visibility-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10; background: transparent; }
        .col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; background: transparent; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .col:last-child { border-right: none; }
        .area-top { flex: 0 0 30vh; border-bottom: 2px solid #555; padding: 15px; box-sizing: border-box; background: transparent; overflow-y: auto; }
        .area-mid { flex: 0 0 20vh; border-bottom: 2px solid #555; padding: 15px; box-sizing: border-box; background: rgba(20, 0, 20, 0.7); overflow-y: auto; border-left: 4px solid #800080; }
        .area-bottom { flex: 1; padding: 15px; box-sizing: border-box; overflow-y: auto; background: transparent; }
        h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #444; padding-bottom: 8px; display: flex; flex-direction: column; gap: 8px; color: #f0f; }
        button { cursor: pointer; border: none; font-weight: bold; outline: none; }
        .shop-tabs { display: flex; flex-wrap: wrap; gap: 3px; justify-content: flex-start; }
        .tab-btn { background: rgba(51, 51, 51, 0.8); color: #ccc; font-size: 0.6rem; padding: 4px 5px; border-radius: 2px; border: 1px solid #555; flex: 1 1 auto; }
        .tab-btn.active { background: #800080; color: white; border-color: #f0f; }
        #retire-trigger { width: 100%; height: 80%; background-color: rgba(102, 34, 34, 0.9); color: white; font-size: 1.8rem; border-radius: 5px; }
        .shop-item { background: rgba(26, 26, 26, 0.9); margin-bottom: 5px; padding: 8px; border: 1px solid #444; cursor: pointer; font-size: 0.75rem; color: #ddd; display: flex; justify-content: space-between; align-items: center; }
        .item-detail { font-size: 0.6rem; color: #aaa; display: block; }
        .main-btn-wrapper { display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 5%; }
        .main-btn { width: 48%; height: 60%; border-radius: 10px; border: 2px solid #555; position: relative; z-index: 20; }
        #through-btn { background-color: #fff; color: black; font-size: 1.5rem; }
        #reward-btn { color: transparent; border: none; } 
        .status-text { font-size: 0.95rem; line-height: 1.6; color: #eee; }
        .rank-info { font-size: 0.85rem; color: #eee; line-height: 1.5; }
        .rank-info b { color: #f0f; font-size: 1.1rem; }
        #log-list { list-style: none; padding: 0; margin: 0; font-size: 0.75rem; }
        .log-entry { border-bottom: 1px dashed #444; padding: 10px 0; color: #bbb; line-height: 1.4; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(17, 17, 17, 0.95); border: 2px solid #f0f; padding: 25px; z-index: 1000; width: 320px; }
        .reason-item { display: block; margin: 12px 0; cursor: pointer; font-size: 1.1rem; }
        .modal-btn { width: 100%; padding: 12px; color: white; margin-top: 10px; font-size: 1.2rem; }
        #user-profile { display: none; font-size: 0.7rem; color: #0f0; margin-top: 5px; }
    </style>
</head>
<body>

    <canvas id="visibility-canvas"></canvas>

    <div id="retire-modal" class="modal">
        <h3 style="color:#f0f; border:none; text-align:center;">リタイア確認</h3>
        <label class="reason-item"><input type="checkbox" name="reason" value="身の危険"> 身の危険を感じた</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="良心"> 良心の呵責</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="満足"> 充分に稼いだ</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="限界"> 精神的限界</label>
        <button id="confirm-retire" class="modal-btn" style="background:#900;">確定して終了</button>
        <button id="cancel-retire" class="modal-btn" style="background:#444;">戻る</button>
    </div>

    <div class="container">
        <div class="col">
            <div class="area-top">
                <button id="retire-trigger">リタイア</button>
                <div id="login-area">
                    <div id="g_id_onload" data-client_id="245586344293-jj8m9cj9k7qel20sapbp6g34gf97nfpf.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
                    <div class="g_id_signin" data-type="standard" data-size="small" data-theme="dark" style="margin-top:10px;"></div>
                </div>
                <div id="user-profile">Login: <span id="user-name"></span></div>
            </div>
            <div class="area-bottom">
                <h3>
                    <span>SHOP</span>
                    <div class="shop-tabs">
                        <button class="tab-btn active" onclick="switchTab(0)">転生</button>
                        <button class="tab-btn" onclick="switchTab(1)">即増</button>
                        <button class="tab-btn" onclick="switchTab(2)">即減</button>
                        <button class="tab-btn" onclick="switchTab(3)">増量UP</button>
                        <button class="tab-btn" onclick="switchTab(4)">抑制</button>
                    </div>
                </h3>
                <div id="shop-container"></div>
            </div>
        </div>
        <div class="col">
            <div class="area-top">
                <h3>相談窓口（現実）</h3>
                <p style="font-size: 0.8rem; line-height: 1.6; color:#bbb;">
                    ・警察庁 匿名通報: 0120-924-839<br>
                    ・貸金業相談: 0570-051-051<br>
                    ・法テラス: 0570-078374
                </p>
            </div>
            <div class="area-bottom">
                <div class="main-btn-wrapper">
                    <button id="through-btn" class="main-btn">スルー</button>
                    <button id="reward-btn" class="main-btn"></button>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="area-top status-text">
                <p>報酬: <span id="money-disp">0</span></p>
                <p>累計: <span id="total-money-disp">0</span></p>
                <p>階層: <span id="rank-disp">0</span></p>
                <p>回避(成/失): <span id="thru-succ-disp">0</span> / <span id="thru-fail-disp">0</span></p>
            </div>
            <div class="area-mid">
                <h3>組織内ランクマッチ</h3>
                <div id="match-info" class="rank-info">初期化中...</div>
            </div>
            <div class="area-bottom">
                <h3>履歴</h3>
                <ul id="log-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'vicious_spiral_save';
        const LOG_KEY = 'vicious_spiral_logs';
        let game = { money: 0, totalMoney: 0, currentReward: 1.0, rank: 0, risk: 0, rewardIncRate: 0.01, riskIncRate: 0.05, isNextDeath: false, thruSucc: 0, thruFail: 0, currentTab: 0, shopCounts: { 0: [0], 1: Array(10).fill(0), 2: Array(10).fill(0), 3: Array(10).fill(0), 4: Array(10).fill(0) }, matchPoint: 0, lastMatchTime: Date.now() };

        function handleCredentialResponse(r) {
            const payload = JSON.parse(atob(r.credential.split('.')[1]));
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('user-profile').style.display = 'block';
            document.getElementById('user-name').innerText = payload.name;
            saveGame();
        }

        function saveGame() { localStorage.setItem(STORAGE_KEY, JSON.stringify(game)); localStorage.setItem(LOG_KEY, document.getElementById('log-list').innerHTML); }

        function loadGame() {
            const s = localStorage.getItem(STORAGE_KEY); if (s) Object.assign(game, JSON.parse(s));
            const l = localStorage.getItem(LOG_KEY); if (l) document.getElementById('log-list').innerHTML = l;
            updateUI(); runMatchSimulation();
        }

        function getRankInfo(pt) {
            if (pt < 300) return { r: Math.floor(pt/100)+1, n: "初等構成員" };
            if (pt < 400) return { r: 4, n: "分水嶺の監視役" };
            if (pt < 700) return { r: Math.floor((pt-400)/100)+5, n: "上級搾取官" };
            return { r: 8, n: "組織支配層" };
        }

        function runMatchSimulation() {
            const now = Date.now();
            const hrs = Math.floor((now - game.lastMatchTime) / 3600000);
            if (hrs > 0) {
                for (let i = 0; i < hrs; i++) {
                    let win = Math.random() < (0.5 + Math.min(0.3, (game.rank * 100) / 5000)); 
                    game.matchPoint += win ? 25 : -15;
                }
                game.lastMatchTime = now; saveGame();
            }
            updateRankDisplay(); setTimeout(runMatchSimulation, 60000);
        }

        function updateRankDisplay() {
            let info = getRankInfo(game.matchPoint);
            document.getElementById('match-info').innerHTML = `階級: <b>Rank ${info.r}</b><br>肩書き: ${info.n}<br>Rating: ${Math.floor(game.matchPoint)} pt`;
        }

        function switchTab(i) { game.currentTab = i; document.querySelectorAll('.tab-btn').forEach((b,idx)=>b.classList.toggle('active',idx===i)); renderShop(); }

        function renderShop() {
            const container = document.getElementById('shop-container'); container.innerHTML = "";
            const r = game.rank + 1;
            let create = (t, i, l, d, b, cb) => {
                const count = game.shopCounts[t][i];
                const cost = Math.floor(b * Math.pow(1.1, count));
                let div = document.createElement('div'); div.className = 'shop-item';
                div.innerHTML = `<div><span>${l} (${cost.toLocaleString()})</span><span class="item-detail">${d}</span></div><span class="item-count">[${count}]</span>`;
                div.onclick = () => { if (game.money >= cost) { game.money -= cost; game.shopCounts[t][i]++; cb(); saveGame(); updateUI(); } };
                container.appendChild(div);
            };

            if (game.currentTab === 0) create(0,0,"次なる搾取へ",`階層+1/リスク・報酬初期化`,200000*Math.pow(2,game.rank),()=>{game.rank++;resetSpiral();});
            else if (game.currentTab === 1) for(let j=0;j<5;j++){ let v=j+1; create(1,j,`報酬UP Lv${v}`,`報酬+${(v*0.05).toFixed(2)}/リスク+${v*2}%`,300*v*r,()=>{game.currentReward+=v*0.05;game.risk+=v*2;}); }
            else if (game.currentTab === 2) for(let j=0;j<5;j++){ let v=j+1; create(2,j,`リスク低減 Lv${v}`,`報酬-2/リスク-${(v*0.1).toFixed(2)}%`,500*v*r,()=>{game.currentReward=Math.max(1,game.currentReward-2);game.risk=Math.max(0,game.risk-v*0.1);}); }
            else if (game.currentTab === 3) for(let j=0;j<5;j++){ let v=j+1; create(3,j,`増率UP Lv${v}`,`増率+${(v*0.002).toFixed(3)}/リスク増率+${(v*0.05).toFixed(2)}`,1000*v*r,()=>{game.rewardIncRate+=v*0.002;game.riskIncRate+=v*0.05;}); }
            else if (game.currentTab === 4) for(let j=0;j<5;j++){ let v=j+1; create(4,j,`抑制 Lv${v}`,`報酬増率-0.01/リスク増率-${(v*0.001).toFixed(3)}`,2000*v*r,()=>{game.rewardIncRate=Math.max(0,game.rewardIncRate-0.01);game.riskIncRate=Math.max(0.01,game.riskIncRate-v*0.001);}); }
        }

        function updateUI() {
            document.getElementById('money-disp').innerText = Math.floor(game.money).toLocaleString();
            document.getElementById('total-money-disp').innerText = Math.floor(game.totalMoney).toLocaleString();
            document.getElementById('rank-disp').innerText = game.rank;
            document.getElementById('thru-succ-disp').innerText = game.thruSucc;
            document.getElementById('thru-fail-disp').innerText = game.thruFail;
            document.getElementById('reward-btn').style.backgroundColor = game.isNextDeath ? "red" : "#fff";
            renderShop(); updateRankDisplay();
        }

        document.getElementById('reward-btn').onclick = () => {
            if (game.isNextDeath) { recordLog("破綻", []); return; }
            if (Math.random() * 100 < game.risk) game.isNextDeath = true;
            else { game.money += game.currentReward; game.totalMoney += game.currentReward; }
            game.currentReward += game.rewardIncRate; game.risk = Math.min(99, game.risk + game.riskIncRate);
            saveGame(); updateUI();
        };

        document.getElementById('through-btn').onclick = () => {
            if (game.isNextDeath) { game.isNextDeath = false; game.thruSucc++; } else game.thruFail++;
            saveGame(); updateUI();
        };

        function resetSpiral() { game.risk = 0; game.isNextDeath = false; game.currentReward = 1.0; saveGame(); updateUI(); }

        function recordLog(type, reasons) {
            const li = document.createElement('li'); li.className = 'log-entry';
            li.innerText = `${game.rank}層 ${Math.floor(game.totalMoney).toLocaleString()}円 ${type} ${reasons.join(',')}`;
            document.getElementById('log-list').prepend(li);
            game.money=0; game.totalMoney=0; game.rank=0; game.matchPoint*=0.5; game.thruSucc=0; game.thruFail=0;
            resetSpiral();
        }

        document.getElementById('retire-trigger').onclick = () => document.getElementById('retire-modal').style.display = 'block';
        document.getElementById('confirm-retire').onclick = () => {
            const reasons = Array.from(document.querySelectorAll('input[name="reason"]:checked')).map(c => c.value);
            recordLog("リタイア", reasons); document.getElementById('retire-modal').style.display = 'none';
        };

        const canvas = document.getElementById('visibility-canvas'), ctx = canvas.getContext('2d');
        let pulseRadius = 100, pulseDir = 1;
        function animate() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pulseRadius += 1 * pulseDir; if (pulseRadius > 300 || pulseRadius < 100) pulseDir *= -1;
            let g = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, pulseRadius);
            g.addColorStop(0, 'rgba(128,0,128,0.2)'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, pulseRadius, 0, Math.PI*2); ctx.fill();
            requestAnimationFrame(animate);
        }
        loadGame(); animate();
    </script>
</body>
</html>
