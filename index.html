<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.01の罠 — 螺旋する搾取 —</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; color: white; font-family: sans-serif; }
        #visibility-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10; background: transparent; }
        .col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; background: transparent; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .col:last-child { border-right: none; }
        .area-top { flex: 0 0 30vh; border-bottom: 2px solid #555; padding: 15px; box-sizing: border-box; background: transparent; overflow-y: auto; }
        .area-bottom { flex: 1; padding: 15px; box-sizing: border-box; overflow-y: auto; background: transparent; }
        h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #444; padding-bottom: 8px; display: flex; flex-direction: column; gap: 8px; text-shadow: 0 0 8px rgba(0,0,0,1); }
        button { cursor: pointer; border: none; font-weight: bold; outline: none; }
        .shop-tabs { display: flex; flex-wrap: wrap; gap: 3px; justify-content: flex-start; }
        .tab-btn { background: rgba(51, 51, 51, 0.8); color: #ccc; font-size: 0.6rem; padding: 4px 5px; border-radius: 2px; border: 1px solid #555; flex: 1 1 auto; }
        .tab-btn.active { background: #800080; color: white; border-color: #f0f; }
        #retire-trigger { width: 100%; height: 60%; background-color: rgba(102, 34, 34, 0.9); color: white; font-size: 1.8rem; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .shop-item { background: rgba(26, 26, 26, 0.9); margin-bottom: 5px; padding: 8px; border: 1px solid #444; cursor: pointer; font-size: 0.75rem; color: #ddd; display: flex; justify-content: space-between; align-items: center; }
        .shop-item:hover { background: rgba(50, 50, 50, 0.9); color: white; }
        .item-count { color: #f0f; font-weight: bold; margin-left: 10px; }
        .main-btn-wrapper { display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 5%; }
        .main-btn { width: 48%; height: 60%; border-radius: 10px; border: 2px solid #555; position: relative; z-index: 20; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        #through-btn { background-color: #fff; color: black; font-size: 1.5rem; }
        #reward-btn { color: transparent; border: none; } 
        .status-text { font-size: 0.95rem; line-height: 1.6; color: #eee; }
        #log-list { list-style: none; padding: 0; margin: 0; font-size: 0.75rem; }
        .log-entry { border-bottom: 1px dashed #333; padding: 10px 0; color: #bbb; line-height: 1.4; }
        .log-entry span { color: #f0f; font-weight: bold; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(17, 17, 17, 0.95); border: 2px solid #f0f; padding: 25px; z-index: 1000; width: 320px; box-shadow: 0 0 30px rgba(128,0,128,0.5); }
        .reason-item { display: block; margin: 12px 0; cursor: pointer; font-size: 1.1rem; color: #ccc; }
        .modal-btn { width: 100%; padding: 12px; color: white; margin-top: 10px; font-size: 1.2rem; }
        
        /* ログイン管理エリア */
        #google-auth-area { margin-top: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .auth-controls { display: flex; gap: 5px; align-items: center; }
        .mini-btn { background: #333; color: #eee; font-size: 0.6rem; padding: 5px 8px; border: 1px solid #555; border-radius: 3px; }
        .mini-btn:hover { background: #555; }
        #auth-status-label { font-size: 0.7rem; color: #aaa; }
        .user-name { color: #0f0; font-weight: bold; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <canvas id="visibility-canvas"></canvas>

    <div id="retire-modal" class="modal">
        <h3 style="color:#f0f; border:none; text-align:center;">リタイア確認</h3>
        <p style="font-size:0.8rem; color:#aaa; text-align:center;">すべて（累計・階層含む）を失って逃げますか？</p>
        <label class="reason-item"><input type="checkbox" name="reason" value="身の危険"> 身の危険を感じた</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="良心"> 良心の呵責</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="満足"> 充分に稼いだ</label>
        <label class="reason-item"><input type="checkbox" name="reason" value="限界"> 精神的限界</label>
        <button id="confirm-retire" class="modal-btn" style="background:#900;">確定して終了</button>
        <button id="cancel-retire" class="modal-btn" style="background:#444;">戻る</button>
    </div>

    <div class="container">
        <div class="col">
            <div class="area-top">
                <button id="retire-trigger">リタイア</button>
                
                <div id="google-auth-area">
                    <div class="auth-controls">
                        <div id="g_id_onload"
                            data-client_id="245586344293-jj8m9cj9k7qel20sapbp6g34gf97nfpf.apps.googleusercontent.com"
                            data-callback="handleCredentialResponse"
                            data-auto_prompt="false"
                            data-auto_select="true">
                        </div>
                        <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="filled_black"></div>
                        
                        <button class="mini-btn" onclick="logoutGoogle()">ログアウト</button>
                        <button class="mini-btn" onclick="changeAccount()">変更</button>
                    </div>
                    <div id="auth-status-label">未ログイン</div>
                </div>
            </div>
            <div class="area-bottom">
                <h3>
                    <span>SHOP (悪意の均衡)</span>
                    <div class="shop-tabs" id="shop-tabs">
                        <button class="tab-btn active" onclick="switchTab(0)">転生</button>
                        <button class="tab-btn" onclick="switchTab(1)">即増</button>
                        <button class="tab-btn" onclick="switchTab(2)">即減</button>
                        <button class="tab-btn" onclick="switchTab(3)">増量UP</button>
                        <button class="tab-btn" onclick="switchTab(4)">抑制</button>
                    </div>
                </h3>
                <div id="shop-container"></div>
            </div>
        </div>
        <div class="col">
            <div class="area-top">
                <h3>相談窓口（現実）</h3>
                <p style="font-size: 0.8rem; line-height: 1.6; color:#bbb;">
                    ・警察庁 匿名通報: 0120-924-839<br>
                    ・貸金業相談: 0570-051-051<br>
                    ・法テラス: 0570-078374
                </p>
            </div>
            <div class="area-bottom">
                <div class="main-btn-wrapper">
                    <button id="through-btn" class="main-btn">スルー</button>
                    <button id="reward-btn" class="main-btn"></button>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="area-top status-text">
                <p>報酬: <span id="money-disp">0</span></p>
                <p>累計: <span id="total-money-disp">0</span></p>
                <p>階層: <span id="rank-disp">0</span></p>
                <p>回避(成/失): <span id="thru-succ-disp">0</span> / <span id="thru-fail-disp">0</span></p>
            </div>
            <div class="area-bottom">
                <h3>履歴</h3>
                <ul id="log-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'vicious_spiral_save';
        const LOG_KEY = 'vicious_spiral_logs';
        const AUTH_KEY = 'vicious_spiral_user';

        let game = {
            money: 0, totalMoney: 0, currentReward: 1.0, 
            rank: 0, risk: 0, rewardIncRate: 0.01, riskIncRate: 0.05,
            isNextDeath: false, thruSucc: 0, thruFail: 0,
            currentTab: 0,
            pulseRadius: 100, pulseTarget: 200, pulseSpeed: 1, pulseDir: 1,
            shopCounts: { 0: [0], 1: Array(10).fill(0), 2: Array(10).fill(0), 3: Array(10).fill(0), 4: Array(10).fill(0) }
        };

        const dom = {
            money: document.getElementById('money-disp'),
            totalMoney: document.getElementById('total-money-disp'),
            rank: document.getElementById('rank-disp'),
            thruSucc: document.getElementById('thru-succ-disp'),
            thruFail: document.getElementById('thru-fail-disp'),
            rewardBtn: document.getElementById('reward-btn'),
            throughBtn: document.getElementById('through-btn'),
            shop: document.getElementById('shop-container'),
            logs: document.getElementById('log-list'),
            modal: document.getElementById('retire-modal'),
            retireTrigger: document.getElementById('retire-trigger'),
            confirmRetire: document.getElementById('confirm-retire'),
            cancelRetire: document.getElementById('cancel-retire'),
            tabs: document.querySelectorAll('.tab-btn'),
            authLabel: document.getElementById('auth-status-label')
        };

        // --- 認証ロジック ---
        let googleUser = JSON.parse(localStorage.getItem(AUTH_KEY)) || null;

        function updateAuthUI() {
            if (googleUser) {
                dom.authLabel.innerHTML = `ログイン中: <span class="user-name">${googleUser.name}</span>`;
            } else {
                dom.authLabel.innerText = "未ログイン";
            }
        }

        function handleCredentialResponse(response) {
            // JWTをデコードして情報を取得
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            
            googleUser = { name: payload.name, email: payload.email, token: response.credential };
            localStorage.setItem(AUTH_KEY, JSON.stringify(googleUser));
            updateAuthUI();
        }

        function logoutGoogle() {
            google.accounts.id.disableAutoSelect();
            googleUser = null;
            localStorage.removeItem(AUTH_KEY);
            updateAuthUI();
            alert("ログアウトしました。ブラウザ上のセーブは維持されます。");
        }

        function changeAccount() {
            google.accounts.id.prompt();
        }

        // --- ゲームエンジン ---
        function saveGame() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(game));
            if (googleUser) {
                // ここでクラウド同期を実行（シミュレーション）
                console.log(`${googleUser.email} へ同期中...`);
            }
        }

        function saveLogs() {
            localStorage.setItem(LOG_KEY, dom.logs.innerHTML);
        }

        function loadGame() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) Object.assign(game, JSON.parse(saved));
            const savedLogs = localStorage.getItem(LOG_KEY);
            if (savedLogs) dom.logs.innerHTML = savedLogs;
            updateUI();
            updateAuthUI();
        }

        function initGame(resetTotal = false) {
            if (resetTotal) { game.rank = 0; game.totalMoney = 0; }
            game.rewardIncRate = 0.01 + (game.rank * 0.005);
            game.riskIncRate = 0.05 + (game.rank * 0.02);
            game.currentReward = 1.0; game.money = 0; game.risk = 0;
            game.isNextDeath = false; game.thruSucc = 0; game.thruFail = 0;
            game.shopCounts = { 0: [0], 1: Array(10).fill(0), 2: Array(10).fill(0), 3: Array(10).fill(0), 4: Array(10).fill(0) };
            saveGame(); updateUI();
        }

        function switchTab(idx) {
            game.currentTab = idx;
            dom.tabs.forEach((btn, i) => btn.classList.toggle('active', i === idx));
            renderShop();
        }

        dom.rewardBtn.onclick = () => {
            if (game.isNextDeath) { processRetire("【不可視のリスク接触による強制破綻】", true); return; }
            let gain = (Math.random() * 100 < game.risk) ? (game.isNextDeath = true, game.currentReward * 0.5) : game.currentReward;
            game.money += gain; game.totalMoney += gain;
            game.currentReward += game.rewardIncRate;
            game.risk = Math.min(99.9, game.risk + game.riskIncRate);
            saveGame(); updateUI();
        };

        dom.throughBtn.onclick = () => {
            if (game.isNextDeath) { game.isNextDeath = false; game.thruSucc++; }
            else { game.currentReward = Math.max(1, game.currentReward * 0.8); game.thruFail++; }
            saveGame(); updateUI();
        };

        function renderShop() {
            dom.shop.innerHTML = "";
            const r = game.rank + 1;
            let createItem = (tabIdx, itemIdx, label, baseCost, onClick) => {
                const count = game.shopCounts[tabIdx][itemIdx];
                const currentCost = Math.floor(baseCost * Math.pow(1.1, count));
                let div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `<span>${label} (${currentCost.toLocaleString()})</span><span class="item-count">[${count}]</span>`;
                div.onclick = () => { 
                    if (game.money >= currentCost) { 
                        game.money -= currentCost; game.shopCounts[tabIdx][itemIdx]++;
                        onClick(); saveGame(); updateUI(); 
                    } 
                };
                dom.shop.appendChild(div);
            };

            if (game.currentTab === 0) {
                createItem(0, 0, "次なる搾取へ", 200000 * Math.pow(2, game.rank), () => { game.rank++; processRebirth(); });
            } else if (game.currentTab === 1) {
                for(let i=0; i<10; i++) createItem(1, i, `報酬:+${((i+1)*0.05).toFixed(2)}/R:+${((i+1)*2).toFixed(1)}`, 300*(i+1)*r, () => { game.currentReward += (i+1)*0.05; game.risk = Math.min(99.9, game.risk + (i+1)*2); });
            } else if (game.currentTab === 2) {
                for(let i=0; i<10; i++) createItem(2, i, `報酬:-${((i+1)*2).toFixed(1)}/R:-${((i+1)*0.1).toFixed(2)}`, 500*(i+1)*r, () => { game.currentReward = Math.max(1, game.currentReward - (i+1)*2); game.risk = Math.max(0, game.risk - (i+1)*0.1); });
            } else if (game.currentTab === 3) {
                for(let i=0; i<10; i++) createItem(3, i, `報酬増率:+${((i+1)*0.002).toFixed(4)}/リスク増率:+${((i+1)*0.05).toFixed(3)}`, 1000*(i+1)*r, () => { game.rewardIncRate += (i+1)*0.002; game.riskIncRate += (i+1)*0.05; });
            } else if (game.currentTab === 4) {
                for(let i=0; i<10; i++) createItem(4, i, `報酬増率:-${((i+1)*0.01).toFixed(3)}/リスク増率:-${((i+1)*0.001).toFixed(4)}`, 2000*(i+1)*r, () => { game.rewardIncRate = Math.max(0, game.rewardIncRate - (i+1)*0.01); game.riskIncRate = Math.max(0.01, game.riskIncRate - (i+1)*0.001); });
            }
        }

        function updateUI() {
            dom.money.innerText = Math.floor(game.money).toLocaleString();
            dom.totalMoney.innerText = Math.floor(game.totalMoney).toLocaleString();
            dom.rank.innerText = game.rank;
            dom.thruSucc.innerText = game.thruSucc; dom.thruFail.innerText = game.thruFail;
            renderShop();
            dom.rewardBtn.style.backgroundColor = game.isNextDeath ? `rgb(${255*(game.risk/100)},${255*(game.risk/100)},${255*(game.risk/100)})` : "#fff";
        }

        function processRebirth() {
            game.risk = 0; game.isNextDeath = false;
            game.shopCounts = { 0: [0], 1: Array(10).fill(0), 2: Array(10).fill(0), 3: Array(10).fill(0), 4: Array(10).fill(0) };
            game.rewardIncRate = 0.01 + (game.rank * 0.005);
            game.riskIncRate = 0.05 + (game.rank * 0.02);
            game.currentReward = 1.0;
            saveGame(); updateUI();
        }

        function processRetire(txt, resetTotal) {
            const li = document.createElement('li'); li.className = 'log-entry';
            li.innerHTML = `<span>${txt}</span><br>階層: ${game.rank} / 累計: ${Math.floor(game.totalMoney).toLocaleString()}`;
            dom.logs.prepend(li); saveLogs(); initGame(resetTotal);
        }

        dom.retireTrigger.onclick = () => dom.modal.style.display = 'block';
        dom.cancelRetire.onclick = () => dom.modal.style.display = 'none';
        dom.confirmRetire.onclick = () => {
            const sel = Array.from(document.querySelectorAll('input[name="reason"]:checked')).map(e => e.value);
            processRetire(`【自発リタイア】${sel.join('/') || "無言"}`, true);
            dom.modal.style.display = 'none';
        };

        const canvas = document.getElementById('visibility-canvas'), ctx = canvas.getContext('2d');
        function animatePulse() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const cx = canvas.width / 2, cy = canvas.height / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            game.pulseRadius += game.pulseSpeed * game.pulseDir;
            if (game.pulseDir > 0 && game.pulseRadius >= game.pulseTarget) { game.pulseDir = -1; game.pulseSpeed = Math.random() * 3 + 1; } 
            else if (game.pulseDir < 0 && game.pulseRadius <= 50) { game.pulseDir = 1; game.pulseTarget = Math.random() * (cy * 1.2 - 200) + 200; game.pulseSpeed = Math.random() * 5 + 2; }
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, game.pulseRadius);
            grad.addColorStop(0, 'rgba(128, 0, 128, 0.9)'); grad.addColorStop(0.7, 'rgba(60, 0, 60, 0.5)'); grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, game.pulseRadius, 0, Math.PI * 2); ctx.fill();
            requestAnimationFrame(animatePulse);
        }

        loadGame(); animatePulse();
    </script>
</body>
</html>
