<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.01の罠 — 螺旋する搾取 —</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; color: white; font-family: sans-serif; }
        #visibility-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            pointer-events: none;
            display: block;
        }
        .container { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 10; background: transparent; }
        .col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; background: transparent; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .col:last-child { border-right: none; }
        .area-top { flex: 0 0 30vh; border-bottom: 2px solid #555; padding: 15px; box-sizing: border-box; background: transparent; overflow-y: auto; }
        .area-bottom { flex: 1; padding: 15px; box-sizing: border-box; overflow-y: auto; background: transparent; }
        h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #444; padding-bottom: 8px; display: flex; flex-direction: column; gap: 8px; text-shadow: 0 0 8px rgba(0,0,0,1); }
        button { cursor: pointer; border: none; font-weight: bold; outline: none; }
        .shop-tabs { display: flex; flex-wrap: wrap; gap: 3px; justify-content: flex-start; }
        .tab-btn { background: rgba(51, 51, 51, 0.8); color: #ccc; font-size: 0.6rem; padding: 4px 5px; border-radius: 2px; border: 1px solid #555; flex: 1 1 auto; }
        .tab-btn.active { background: #800080; color: white; border-color: #f0f; }
        #retire-trigger { width: 100%; height: 50%; background-color: rgba(102, 34, 34, 0.9); color: white; font-size: 1.8rem; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #share-btn { width: 100%; margin-top: 10px; background: #000; color: #ff00ff; border: 1px dashed #f0f; padding: 8px; border-radius: 4px; font-size: 0.65rem; opacity: 0.8; }
        .shop-item { background: rgba(26, 26, 26, 0.9); margin-bottom: 5px; padding: 8px; border: 1px solid #444; cursor: pointer; font-size: 0.75rem; color: #ddd; display: flex; justify-content: space-between; align-items: center; }
        .shop-item:hover { background: rgba(50, 50, 50, 0.9); color: white; }
        .item-count { color: #f0f; font-weight: bold; margin-left: 10px; }
        .main-btn-wrapper { display: flex; justify-content: space-between; align-items: center; height: 100%; padding: 0 5%; position: relative; box-sizing: border-box; }
        .main-btn { width: 48%; height: 60%; border-radius: 10px; border: 2px solid #555; position: relative; z-index: 20; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        #through-btn { background-color: #fff; color: black; font-size: 1.5rem; }
        #reward-btn { border: none; font-size: 1.5rem; transition: background-color 0.1s; } 
        .sub-action-btn { position: absolute; width: calc((100% - 10%) * 0.48); height: 40px; border-radius: 5px; z-index: 30; font-size: 0.75rem; box-sizing: border-box; transition: opacity 0.2s; cursor: pointer; }
        #escape-btn { bottom: calc(20% + 60% + 5px); left: 5%; background: #404; color: #f0f; border: 1px solid #f0f; }
        #prevent-flee-btn { bottom: calc(20% + 60% + 5px); right: 5%; background: #060; color: #0f0; border: 1px solid #0f0; display: none; }
        .status-text { font-size: 0.95rem; line-height: 1.6; color: #eee; }
        .stats-line { font-size: 0.65rem; color: #aaa; border-top: 1px solid #333; padding-top: 2px; margin-top: 2px; white-space: nowrap; }
        .stats-line b { color: #fff; margin-left: 4px; }
        #log-list { list-style: none; padding: 0; margin: 0; font-size: 0.75rem; }
        .log-entry { border-bottom: 1px dashed #333; padding: 10px 0; color: #bbb; line-height: 1.4; }
        .log-entry span.reason { color: #f0f; font-weight: bold; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(17, 17, 17, 0.95); border: 2px solid #f0f; padding: 25px; z-index: 1000; width: 320px; box-shadow: 0 0 30px rgba(128,0,128,0.5); }
        .reason-item { display: block; margin: 12px 0; cursor: pointer; font-size: 1.1rem; color: #ccc; }
        .modal-btn { width: 100%; padding: 12px; color: white; margin-top: 10px; font-size: 1.2rem; }
        #tax-container { display: none; flex-direction: column; gap: 8px; }
        .tax-btn { padding: 10px; color: white; font-weight: bold; border-radius: 4px; font-size: 0.9rem; }
        #exploitation-ui { margin-top: 15px; padding: 10px; background: rgba(255,0,0,0.1); border: 1px solid #500; display: none; }
        .slider-label { font-size: 0.7rem; display: block; margin-bottom: 5px; color: #f66; }
        #exploit-slider { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="visibility-canvas"></canvas>

    <div id="retire-modal" class="modal">
        <h3 style="color:#f0f; border:none; text-align:center;">リタイア確認</h3>
        <div id="reason-list">
            <label class="reason-item"><input type="checkbox" name="reason" value="身の危険"> 身の危険を感じた</label>
            <label class="reason-item"><input type="checkbox" name="reason" value="良心"> 良心の呵責</label>
            <label class="reason-item"><input type="checkbox" name="reason" value="満足"> 充分に稼いだ</label>
            <label class="reason-item"><input type="checkbox" name="reason" value="限界"> 精神的限界</label>
        </div>
        <button id="confirm-retire" class="modal-btn" style="background:#900;">確定して終了</button>
        <button id="cancel-retire" class="modal-btn" style="background:#444;">戻る</button>
    </div>

    <div class="container">
        <div class="col">
            <div class="area-top">
                <button id="retire-trigger">リタイア</button>
                <button id="share-btn">拡散や共有をするのはやめてください。お願いします(´°̥̥̥̥̥̥̥̥ω°̥̥̥̥̥̥̥̥｀)</button>
            </div>
            <div class="area-bottom">
                <h3>
                    <span>SHOP (悪意の均衡)</span>
                    <div class="shop-tabs" id="shop-tabs">
                        <button class="tab-btn active" onclick="switchTab(0)">転生</button>
                        <button class="tab-btn" onclick="switchTab(1)">即増</button>
                        <button class="tab-btn" onclick="switchTab(2)">即減</button>
                        <button class="tab-btn" onclick="switchTab(3)">増量UP</button>
                        <button class="tab-btn" onclick="switchTab(4)">抑制</button>
                    </div>
                </h3>
                <div id="shop-container"></div>
                <div id="exploitation-ui">
                    <span class="slider-label">搾取率: <span id="exploit-val">0</span>%</span>
                    <input type="range" id="exploit-slider" min="0" max="100" value="0">
                </div>
            </div>
        </div>
        <div class="col">
            <div class="area-top">
                <div id="consult-ui">
                    <h3>相談窓口（現実）</h3>
                    <p style="font-size: 0.8rem; line-height: 1.6; color:#bbb;">
                        ・警察庁 匿名通報: 0120-924-839<br>
                        ・貸金業相談: 0570-051-051<br>
                        ・法テラス: 0570-078374
                    </p>
                </div>
                <div id="tax-container">
                    <h3 style="color:#f00; border-color:#f00;">徴収の刻（上納）</h3>
                    <p style="font-size:0.9rem; margin:0;">上納額: <span id="tax-amount-disp" style="color:#f00; font-weight:bold;">0</span></p>
                    <button id="pay-tax-btn" class="tax-btn" style="background:#600;">支払って継続</button>
                    <button id="tax-retire-btn" class="tax-btn" style="background:#222;">ここでリタイア</button>
                </div>
            </div>
            <div class="area-bottom">
                <div class="main-btn-wrapper">
                    <button id="escape-btn" class="sub-action-btn">搾取から逃れる</button>
                    <button id="prevent-flee-btn" class="sub-action-btn">逃走を阻止する</button>
                    <button id="through-btn" class="main-btn">スルー</button>
                    <button id="reward-btn" class="main-btn"></button>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="area-top status-text" id="status-panel">
                <p>報酬: <span id="money-disp">0</span></p>
                <p>累計: <span id="total-money-disp">0</span></p>
                <p>階層: <span id="rank-disp">0</span></p>
                <p>回避(成/失): <span id="thru-succ-disp">0</span> / <span id="thru-fail-disp">0</span></p>
                
                <div class="stats-line" id="be-stats-line" style="color:#f66;">
                    被搾取: <b>計</b><span id="be-total">0</span> <b>最少</b><span id="be-min">0</span> <b>最大</b><span id="be-max">0</span> <b>平均</b><span id="be-avg">0</span>
                </div>
                <div id="exploit-stats-container" class="stats-line" style="color:#6f6; display:none;">
                    加搾取: <b>計</b><span id="do-total">0</span> <b>最少</b><span id="do-min">0</span> <b>最大</b><span id="do-max">0</span> <b>平均</b><span id="do-avg">0</span>
                </div>
            </div>
            <div class="area-bottom">
                <h3>履歴</h3>
                <ul id="log-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'spiral_exploitation_v_final_v11';
        const LOG_KEY = 'spiral_exploitation_logs_v11';

        const initialState = {
            money: 0, totalMoney: 0, currentReward: 1.0, 
            rank: 0, risk: 0, rewardIncRate: 0.01, riskIncRate: 0.01,
            isNextDeath: false, thruSucc: 0, thruFail: 0,
            currentTab: 0,
            shopCounts: { 0: [0], 1: Array(10).fill(0), 2: Array(10).fill(0), 3: Array(10).fill(0), 4: Array(10).fill(0) },
            periodGain: 0, isTaxTime: false, bgRed: 0,
            escapeCount: 0, isEscaping: false, isExploited: false,
            exploitRate: 0, isTargetCaught: false, targetFleeing: false,
            beExploitedList: [], doExploitedList: [],
            currentBeExploitedSum: 0, currentDoExploitedSum: 0
        };

        let game = JSON.parse(JSON.stringify(initialState));

        const dom = {
            money: document.getElementById('money-disp'),
            totalMoney: document.getElementById('total-money-disp'),
            rank: document.getElementById('rank-disp'),
            thruSucc: document.getElementById('thru-succ-disp'),
            thruFail: document.getElementById('thru-fail-disp'),
            rewardBtn: document.getElementById('reward-btn'),
            throughBtn: document.getElementById('through-btn'),
            escapeBtn: document.getElementById('escape-btn'),
            preventFleeBtn: document.getElementById('prevent-flee-btn'),
            shop: document.getElementById('shop-container'),
            logs: document.getElementById('log-list'),
            modal: document.getElementById('retire-modal'),
            consultUi: document.getElementById('consult-ui'),
            taxContainer: document.getElementById('tax-container'),
            taxAmountDisp: document.getElementById('tax-amount-disp'),
            payTaxBtn: document.getElementById('pay-tax-btn'),
            taxRetireBtn: document.getElementById('tax-retire-btn'),
            retireTrigger: document.getElementById('retire-trigger'),
            confirmRetire: document.getElementById('confirm-retire'),
            cancelRetire: document.getElementById('cancel-retire'),
            tabs: document.querySelectorAll('.tab-btn'),
            exploitUi: document.getElementById('exploitation-ui'),
            exploitSlider: document.getElementById('exploit-slider'),
            exploitVal: document.getElementById('exploit-val'),
            beTotal: document.getElementById('be-total'), beMin: document.getElementById('be-min'), beMax: document.getElementById('be-max'), beAvg: document.getElementById('be-avg'),
            doTotal: document.getElementById('do-total'), doMin: document.getElementById('do-min'), doMax: document.getElementById('do-max'), doAvg: document.getElementById('do-avg'),
            exploitStatsContainer: document.getElementById('exploit-stats-container'),
            statusPanel: document.getElementById('status-panel')
        };

        function saveGame() { localStorage.setItem(STORAGE_KEY, JSON.stringify(game)); }
        function saveLogs() { localStorage.setItem(LOG_KEY, dom.logs.innerHTML); }

        function loadGame() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) Object.assign(game, JSON.parse(saved));
            const savedLogs = localStorage.getItem(LOG_KEY);
            if (savedLogs) dom.logs.innerHTML = savedLogs;
            dom.exploitSlider.value = game.exploitRate || 0;
            dom.exploitVal.innerText = game.exploitRate || 0;
            updateUI();
        }

        function getStatSnapshot() {
            const clone = dom.statusPanel.cloneNode(true);
            const moneyP = clone.querySelector('p');
            if (moneyP) moneyP.remove();
            return clone.innerHTML;
        }

        function updateUI() {
            dom.money.innerText = Math.floor(game.money).toLocaleString();
            dom.totalMoney.innerText = Math.floor(game.totalMoney).toLocaleString();
            dom.rank.innerText = game.rank;
            dom.thruSucc.innerText = game.thruSucc; dom.thruFail.innerText = game.thruFail;
            const activeBe = [...game.beExploitedList]; if (game.currentBeExploitedSum > 0) activeBe.push(game.currentBeExploitedSum);
            const activeDo = [...game.doExploitedList]; if (game.currentDoExploitedSum > 0) activeDo.push(game.currentDoExploitedSum);
            displayStats(activeBe, dom.beTotal, dom.beMin, dom.beMax, dom.beAvg);
            displayStats(activeDo, dom.doTotal, dom.doMin, dom.doMax, dom.doAvg);
            dom.exploitStatsContainer.style.display = game.rank >= 5 ? 'block' : 'none';
            dom.exploitUi.style.display = game.rank >= 5 ? 'block' : 'none';
            dom.preventFleeBtn.style.display = (game.rank >= 5 && game.targetFleeing) ? 'block' : 'none';
            if (game.isTaxTime) { dom.consultUi.style.display = 'none'; dom.taxContainer.style.display = 'flex'; } 
            else { dom.consultUi.style.display = 'block'; dom.taxContainer.style.display = 'none'; }
            
            const opacity = Math.max(0, 1 - (game.risk / 100));
            
            if (game.isNextDeath) {
                const rgb = Math.floor((game.risk / 100) * 255);
                dom.rewardBtn.innerText = "";
                dom.rewardBtn.style.backgroundColor = `rgb(${rgb}, 0, 0)`;
                dom.rewardBtn.style.opacity = 1;
            } else {
                dom.rewardBtn.innerText = "";
                dom.rewardBtn.style.backgroundColor = `rgba(255, 255, 255, ${opacity})`;
                dom.rewardBtn.style.opacity = opacity;
            }
            renderShop();
        }

        function displayStats(list, tDom, minDom, maxDom, avgDom) {
            if (list.length === 0) { tDom.innerText = 0; minDom.innerText = 0; maxDom.innerText = 0; avgDom.innerText = 0; return; }
            const sum = list.reduce((a, b) => a + b, 0);
            tDom.innerText = Math.floor(sum).toLocaleString();
            minDom.innerText = Math.floor(Math.min(...list)).toLocaleString();
            maxDom.innerText = Math.floor(Math.max(...list)).toLocaleString();
            avgDom.innerText = Math.floor(sum / list.length).toLocaleString();
        }

        function processDeathOrRetire(msg) {
            // 指示通り、Snapshot を撮るまでは push しない（二重計上防止）
            const snapshot = getStatSnapshot();

            // 記録用データの確定
            if (game.currentBeExploitedSum > 0) game.beExploitedList.push(game.currentBeExploitedSum);
            if (game.currentDoExploitedSum > 0) game.doExploitedList.push(game.currentDoExploitedSum);
            
            const li = document.createElement('li');
            li.className = 'log-entry';
            li.innerHTML = `<span class="reason">${msg}</span><div class="status-text" style="font-size:0.7rem; opacity:0.8;">${snapshot}</div>`;
            
            dom.logs.prepend(li);
            saveLogs();
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        dom.escapeBtn.onclick = () => {
            if (game.isTaxTime) return;
            if (!game.isEscaping && !game.isExploited) {
                if (Math.random() * 100 < (100 - game.escapeCount)) { game.isEscaping = true; game.escapeCount++; } 
                else { game.isExploited = true; }
            } else if (game.isEscaping) {
                if (game.currentBeExploitedSum > 0) { game.beExploitedList.push(game.currentBeExploitedSum); game.currentBeExploitedSum = 0; }
                game.isEscaping = false; game.isExploited = false;
            }
            saveGame(); updateUI();
        };

        dom.rewardBtn.onclick = () => {
            if (game.isTaxTime) return;
            if (game.isNextDeath) { processDeathOrRetire("【破綻】"); return; }
            const roll = Math.random() * 100;
            const exploit = game.exploitRate;

            if (game.rank >= 5) {
                if (!game.isTargetCaught && !game.targetFleeing) { if (roll < (100 - exploit)) game.targetFleeing = true; } 
                else if (game.isTargetCaught) {
                    if (roll < exploit) { 
                        game.isTargetCaught = false; game.targetFleeing = true;
                        if (game.currentDoExploitedSum > 0) { game.doExploitedList.push(game.currentDoExploitedSum); game.currentDoExploitedSum = 0; }
                    }
                }
            }
            if (game.isEscaping && roll < (100 - (game.escapeCount - 1))) { 
                if (game.currentBeExploitedSum > 0) { game.beExploitedList.push(game.currentBeExploitedSum); game.currentBeExploitedSum = 0; }
                game.isEscaping = false; game.isExploited = false;
            }
            if (!game.isEscaping && !game.isExploited && roll < game.risk) {
                if (game.periodGain > 0) { showTaxUI(); return; }
                else game.isNextDeath = true;
            }

            const chanceToDie = 0.01 * (game.rank + 1);
            game.risk = Math.min(100, game.risk + chanceToDie);
            if (Math.random() * 100 < game.risk) {
                game.isNextDeath = true;
            }

            let baseGain = (game.isExploited || game.isEscaping) ? 0 : (game.isNextDeath ? game.currentReward * 0.5 : game.currentReward);
            if (game.isExploited || game.isEscaping) { game.currentBeExploitedSum += game.currentReward; }
            let exploitGain = game.isTargetCaught ? (baseGain * (exploit / 10)) : 0;
            if (exploitGain > 0) game.currentDoExploitedSum += exploitGain;
            let gain = baseGain + exploitGain;
            game.money += gain; game.totalMoney += gain; game.periodGain += gain; 
            game.currentReward += game.rewardIncRate;
            const riskFactor = 1 + (exploit / 20);
            game.risk = Math.min(100, Math.max(0, game.risk + (game.riskIncRate * riskFactor)));
            saveGame(); updateUI();
        };

        dom.payTaxBtn.onclick = () => {
            const tax = Math.ceil(game.periodGain * (game.risk / 100));
            if (game.money >= tax) {
                game.money -= tax; game.currentBeExploitedSum += tax; game.periodGain = 0; game.isTaxTime = false;
                saveGame(); updateUI();
            } else { processDeathOrRetire("【未払い破綻】"); }
        };

        function switchTab(idx) { game.currentTab = idx; dom.tabs.forEach((btn, i) => btn.classList.toggle('active', i === idx)); renderShop(); }
        dom.exploitSlider.oninput = (e) => { game.exploitRate = parseInt(e.target.value); dom.exploitVal.innerText = game.exploitRate; saveGame(); };
        dom.preventFleeBtn.onclick = () => { game.isTargetCaught = true; game.targetFleeing = false; game.currentDoExploitedSum = 0; saveGame(); updateUI(); };
        function showTaxUI() { game.isTaxTime = true; const tax = Math.ceil(game.periodGain * (game.risk / 100)); dom.taxAmountDisp.innerText = tax.toLocaleString(); updateUI(); }
        dom.taxRetireBtn.onclick = () => { processDeathOrRetire("【徴収時リタイア】"); };
        
        dom.throughBtn.onclick = () => { 
            if (game.isTaxTime) return; 
            if (game.isNextDeath) { 
                game.isNextDeath = false; 
                game.thruSucc++; 
            } else { 
                game.currentReward = 1.0;
                game.thruFail++; 
            } 
            saveGame(); updateUI(); 
        };
        
        function renderShop() {
            dom.shop.innerHTML = ""; const r = game.rank + 1;
            let createItem = (tabIdx, itemIdx, label, baseCost, onClick) => {
                const count = game.shopCounts[tabIdx][itemIdx]; const currentCost = Math.floor(baseCost * Math.pow(1.1, count));
                let div = document.createElement('div'); div.className = 'shop-item';
                div.innerHTML = `<div style="display:flex; align-items:center; gap:5px;"><span>${label}</span><span style="font-size:0.6rem; color:#aaa;">(${currentCost.toLocaleString()})</span></div><span class="item-count">[${count}]</span>`;
                div.onclick = () => { if (game.money >= currentCost && !game.isTaxTime) { game.money -= currentCost; game.shopCounts[tabIdx][itemIdx]++; onClick(); saveGame(); updateUI(); } };
                dom.shop.appendChild(div);
            };
            if (game.currentTab === 0) createItem(0, 0, `次なる搾取へ`, Math.floor(200000 * Math.pow(1.1, game.rank)), () => { game.rank++; processRebirth(); });
            else if (game.currentTab === 1) for(let i=0; i<10; i++) createItem(1, i, `報酬:+${((i+1)*0.05).toFixed(2)}/リスク:+${((i+1)*2.0).toFixed(1)}`, 300*(i+1)*r, () => { game.currentReward += (i+1)*0.05; game.risk = Math.min(100, game.risk + (i+1)*2.0); });
            else if (game.currentTab === 2) for(let i=0; i<10; i++) createItem(2, i, `報酬:-${((i+1)*2.0).toFixed(1)}/リスク:-${((i+1)*0.1).toFixed(2)}`, 500*(i+1)*r, () => { game.currentReward = Math.max(1, game.currentReward - (i+1)*2.0); game.risk = Math.max(0, game.risk - (i+1)*0.1); });
            else if (game.currentTab === 3) for(let i=0; i<10; i++) createItem(3, i, `報酬増率:+${((i+1)*0.002).toFixed(4)}/リスク増率:+${((i+1)*0.05).toFixed(3)}`, 1000*(i+1)*r, () => { game.rewardIncRate += (i+1)*0.002; game.riskIncRate += (i+1)*0.05; });
            else if (game.currentTab === 4) for(let i=0; i<10; i++) createItem(4, i, `報酬増率:-${((i+1)*0.01).toFixed(3)}/リスク増率:-${((i+1)*0.001).toFixed(4)}`, 2000*(i+1)*r, () => { game.rewardIncRate = Math.max(0, game.rewardIncRate - (i+1)*0.01); game.riskIncRate -= (i+1)*0.001; });
        }
        function processRebirth() { game.risk = 0; game.isNextDeath = false; game.rewardIncRate = 0.01; game.riskIncRate = 0.01; game.currentReward = 1.0; game.isEscaping = false; game.isExploited = false; game.isTargetCaught = false; game.targetFleeing = false; saveGame(); updateUI(); }
        dom.retireTrigger.onclick = () => { if(!game.isTaxTime) dom.modal.style.display = 'block'; };
        dom.cancelRetire.onclick = () => { dom.modal.style.display = 'none'; };
        dom.confirmRetire.onclick = () => {
            const checked = Array.from(document.querySelectorAll('input[name="reason"]:checked')).map(el => el.value);
            const reasonStr = checked.length > 0 ? ` [${checked.join(", ")}]` : " [理由なし]";
            processDeathOrRetire("【自発リタイア】" + reasonStr);
        };

        const canvas = document.getElementById('visibility-canvas'), ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function animateHeartbeat(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let bodyBg = "black";
            if (game.isTaxTime) { 
                game.bgRed += 2; 
                bodyBg = `rgb(${Math.floor((Math.sin(game.bgRed * 0.1) + 1) * 60)}, 0, 0)`; 
            } else if (game.isTargetCaught) { bodyBg = "#020"; }
            document.body.style.backgroundColor = bodyBg;
            const bpm = 60 + (game.risk * 2); 
            const period = (60 / bpm) * 1000;
            const t = (time % period) / period;
            let pulse = 0;
            if (t < 0.12) pulse = Math.sin((t / 0.12) * Math.PI) * 0.7;
            else if (t < 0.2) pulse = 0.15;
            else if (t < 0.45) pulse = Math.sin(((t - 0.2) / 0.25) * Math.PI) * 1.0;
            const centerX = canvas.width / 2; const centerY = canvas.height / 2;
            const baseRadius = Math.min(canvas.width, canvas.height) * 0.25;
            const finalRadius = baseRadius * (1 + pulse * 0.4) * (1 + (game.risk / 60));
            const glowStrength = 20 + (pulse * 50);
            ctx.shadowBlur = glowStrength; ctx.shadowColor = "#FF00FF";
            ctx.beginPath(); ctx.arc(centerX, centerY, finalRadius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, finalRadius);
            grad.addColorStop(0, '#FF00FF'); grad.addColorStop(0.7, '#8A2BE2'); grad.addColorStop(1, '#4B0082');
            ctx.fillStyle = grad; ctx.fill();
            ctx.strokeStyle = `rgba(255, 0, 255, ${0.4 + pulse * 0.6})`;
            ctx.lineWidth = 15 * pulse + 5; ctx.stroke();
            requestAnimationFrame(animateHeartbeat);
        }

        loadGame();
        requestAnimationFrame(animateHeartbeat);
    </script>
</body>
</html>
